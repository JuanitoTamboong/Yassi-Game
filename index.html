<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading Yassi</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="loader" role="status" aria-live="polite">
    <div class="avatar-container">
      <img src="./assets/avatar.png" alt="Yassi Avatar" id="yassiAvatar" class="avatar" />
      <div class="avatar-fill" id="avatarFill"></div>
      <div class="avatar-glow"></div>
    </div>
    <div class="title">Loading Yassi...</div>
    <div class="progress-info">
      <div class="progress-text" id="progressText">Waking up Yassi</div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-percent" id="progressPercent">0%</div>
    </div>
  </div>

  <script src="./js/script.js"></script>
</body>
</html>
